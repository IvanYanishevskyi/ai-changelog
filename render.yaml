services:
  - type: web
    name: ai-changelog
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn changelog.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-changelog-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: ai-changelog-db
    region: oregon
    plan: free
    databaseName: changelog
    ipAllowList: []
