app = "ai-changelog-staging"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[processes]
  app = "uvicorn changelog.main:app --host 0.0.0.0 --port 8000"
  worker = "celery -A changelog.workers.celery_app worker --loglevel=info"

[checks]
  [checks.health]
    port = 8000
    type = "http"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
